<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>당곡고 계정 조회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --ink: #1a1a1a;
    --muted: #6b6358;
    --line: #d9d2c4;
    --card: #ffffff;
    --accent: #d94436;
    --accent-soft: #fce8e5;
    --ok: #2d7a4f;
    --ok-soft: #e3f1ea;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(50,40,30,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-tap-highlight-color: transparent;
    padding: 20px 16px 60px;
  }
  .wrap { max-width: 520px; margin: 0 auto; }
  header {
    text-align: center;
    padding: 12px 0 28px;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  h1 .dot { color: var(--accent); }
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
  }

  /* 탭 */
  .tabs {
    display: flex;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    padding: 11px 8px;
    text-align: center;
    font-size: 14px;
    font-family: inherit;
    color: var(--muted);
    background: transparent;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--ink);
    color: #fff;
  }

  /* 카드 */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 22px 20px;
    box-shadow: var(--shadow);
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* 입력 영역 */
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  input[type="text"], select {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    padding: 13px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fdfcf9;
    color: var(--ink);
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="text"]:focus, select:focus {
    outline: none;
    border-color: var(--ink);
    background: #fff;
  }
  #idInput {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 16px 14px;
  }
  select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath d='M1 1l5 5 5-5' stroke='%236b6358' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
  }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }
  .hint code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
  }

  /* 결과 영역 */
  #result { margin-top: 18px; }
  .result-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    animation: slideIn 0.25s ease-out;
    box-shadow: var(--shadow);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-head {
    padding: 16px 20px;
    background: var(--ink);
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-head .who {
    font-size: 15px;
  }
  .result-head .who strong { font-weight: 400; }
  .result-head .who .id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    opacity: 0.6;
    margin-left: 6px;
  }
  .credential {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }
  .credential:last-child { border-bottom: none; }
  .cred-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .cred-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cred-value {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    background: var(--bg);
    padding: 12px 14px;
    border-radius: 8px;
    word-break: break-all;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-user-select: all;
    user-select: all;
  }
  .cred-value.hidden {
    letter-spacing: 0.1em;
  }
  .icon-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: var(--muted);
  }
  .icon-btn:hover { border-color: var(--ink); color: var(--ink); }
  .icon-btn:active { transform: scale(0.95); }
  .icon-btn.copied {
    background: var(--ok-soft);
    border-color: var(--ok);
    color: var(--ok);
  }
  .icon-btn svg { width: 20px; height: 20px; }

  /* 에러 */
  .error {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
    animation: slideIn 0.2s ease-out;
  }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 안내 */
  .notice {
    margin-top: 24px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    border-left: 2px solid var(--line);
  }
  .notice strong { color: var(--ink); font-weight: 400; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">당곡고등학교 · 정보 수업</div>
    <h1>내 계정 찾기<span class="dot">.</span></h1>
    <div class="sub">학번을 입력하면 아이디와 비밀번호를 보여줘요</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-panel="num">학번 입력</button>
    <button class="tab" data-panel="sel">반·번호 선택</button>
  </div>

  <div class="card">
    <!-- 학번 입력 패널 -->
    <div class="panel active" id="panel-num">
      <label for="idInput">학번 5자리</label>
      <input type="text" id="idInput" inputmode="text" autocomplete="off" autocapitalize="off" placeholder="10501" maxlength="5">
      <div class="hint">
        예: <code>10501</code> = 1학년 5반 1번 / <code>105T1</code> = 5반 교사1
      </div>
    </div>

    <!-- 드롭다운 패널 -->
    <div class="panel" id="panel-sel">
      <label>학급과 번호를 선택하세요</label>
      <div class="row">
        <select id="selClass">
          <option value="">반 선택</option>
        </select>
        <select id="selNum" disabled>
          <option value="">번호 선택</option>
        </select>
      </div>
    </div>
  </div>

  <div id="result"></div>

  <div class="notice">
    <strong>안내</strong><br>
    · 복사 버튼을 누르면 자동으로 클립보드에 저장돼요<br>
    · 비밀번호는 기본적으로 가려져 있어요. 눈 모양 버튼으로 확인하세요<br>
    · 비밀번호는 절대 다른 사람과 공유하지 마세요
  </div>
</div>

<div class="toast" id="toast">복사되었습니다</div>

// 데이터 파싱 및 인덱싱
// 학번 키: 1학년+학급2자리+번호2자리, 교사는 105T1/105T2 등
const accounts = {};   // key: "10501" → {grade, klass, num, id, pw, label}
const byClass = {};    // class → [번호 목록]

RAW_DATA.forEach(row => {
  const [grade, klass, num, id, pw] = row;
  if (!grade) return;

  let key, label;
  const gradeStr = String(grade);
  const klassStr = String(klass).padStart(2, '0');

  if (num.startsWith('교')) {
    // 교사: 교1 → T1, 교2 → T2
    const tNum = num.replace('교', '');
    key = `${gradeStr}${klassStr}T${tNum}`;
    label = `${grade}학년 ${klass}반 교사${tNum}`;
  } else {
    const numStr = String(num).padStart(2, '0');
    key = `${gradeStr}${klassStr}${numStr}`;
    label = `${grade}학년 ${klass}반 ${num}번`;
  }

  accounts[key] = { grade, klass, num, id, pw, label, key };

  if (!byClass[klass]) byClass[klass] = [];
  byClass[klass].push({ num, key, label });
});

// ===== 탭 전환 =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    document.getElementById('result').innerHTML = '';
  });
});

// ===== 학번 직접 입력 =====
const idInput = document.getElementById('idInput');
idInput.addEventListener('input', e => {
  // 대문자 변환 + 영숫자만
  let v = e.target.value.toUpperCase().replace(/[^0-9T]/g, '');
  if (v.length > 5) v = v.slice(0, 5);
  e.target.value = v;

  if (v.length === 5) {
    lookup(v);
  } else {
    document.getElementById('result').innerHTML = '';
  }
});

// ===== 드롭다운 =====
const selClass = document.getElementById('selClass');
const selNum = document.getElementById('selNum');

// 학급 옵션 채우기
Object.keys(byClass).sort((a, b) => Number(a) - Number(b)).forEach(k => {
  const opt = document.createElement('option');
  opt.value = k;
  opt.textContent = `${k}반`;
  selClass.appendChild(opt);
});

selClass.addEventListener('change', () => {
  const k = selClass.value;
  selNum.innerHTML = '<option value="">번호 선택</option>';
  document.getElementById('result').innerHTML = '';

  if (!k) {
    selNum.disabled = true;
    return;
  }
  selNum.disabled = false;

  // 교사 먼저, 그다음 번호 순
  const items = byClass[k].slice().sort((a, b) => {
    const ta = a.num.startsWith('교');
    const tb = b.num.startsWith('교');
    if (ta && !tb) return -1;
    if (!ta && tb) return 1;
    if (ta && tb) return a.num.localeCompare(b.num);
    return Number(a.num) - Number(b.num);
  });

  items.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.key;
    opt.textContent = item.num.startsWith('교') ? `교사 ${item.num.replace('교', '')}` : `${item.num}번`;
    selNum.appendChild(opt);
  });
});

selNum.addEventListener('change', () => {
  if (selNum.value) lookup(selNum.value);
  else document.getElementById('result').innerHTML = '';
});

// ===== 조회 및 결과 렌더링 =====
function lookup(key) {
  const result = document.getElementById('result');
  const acc = accounts[key];

  if (!acc) {
    result.innerHTML = `
      <div class="error">
        해당 학번이 없어요. 다시 확인해 주세요.<br>
        <small style="opacity:0.75">입력: ${escapeHtml(key)}</small>
      </div>`;
    return;
  }

  result.innerHTML = `
    <div class="result-card">
      <div class="result-head">
        <div class="who">
          <strong>${escapeHtml(acc.label)}</strong>
          <span class="id">${escapeHtml(acc.key)}</span>
        </div>
      </div>
      <div class="credential">
        <div class="cred-label">아이디</div>
        <div class="cred-row">
          <div class="cred-value" id="idValue">${escapeHtml(acc.id)}</div>
          <button class="icon-btn" data-copy="${escapeHtml(acc.id)}" aria-label="아이디 복사">
            ${ICON_COPY}
          </button>
        </div>
      </div>
      <div class="credential">
        <div class="cred-label">비밀번호</div>
        <div class="cred-row">
          <div class="cred-value hidden" id="pwValue" data-real="${escapeHtml(acc.pw)}">${'●'.repeat(acc.pw.length)}</div>
          <button class="icon-btn" id="pwToggle" aria-label="비밀번호 보기">
            ${ICON_EYE}
          </button>
          <button class="icon-btn" data-copy="${escapeHtml(acc.pw)}" aria-label="비밀번호 복사">
            ${ICON_COPY}
          </button>
        </div>
      </div>
    </div>
  `;

  // 복사 버튼
  result.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      copyToClipboard(btn.dataset.copy, btn);
    });
  });

  // 비밀번호 토글
  const pwToggle = document.getElementById('pwToggle');
  const pwValue = document.getElementById('pwValue');
  let visible = false;
  pwToggle.addEventListener('click', () => {
    visible = !visible;
    if (visible) {
      pwValue.textContent = pwValue.dataset.real;
      pwValue.classList.remove('hidden');
      pwToggle.innerHTML = ICON_EYE_OFF;
    } else {
      pwValue.textContent = '●'.repeat(pwValue.dataset.real.length);
      pwValue.classList.add('hidden');
      pwToggle.innerHTML = ICON_EYE;
    }
  });
}

// ===== 복사 =====
async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (_) {}
    document.body.removeChild(ta);
  }
  showToast('복사되었습니다');
  if (btn) {
    const original = btn.innerHTML;
    btn.classList.add('copied');
    btn.innerHTML = ICON_CHECK;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = original;
    }, 1500);
  }
}

// ===== 토스트 =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

// ===== 유틸 =====
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
